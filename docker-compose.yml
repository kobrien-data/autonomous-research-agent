services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${API_PORT:-8000}/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    env_file: .env
    ports:
      - "${UI_PORT:-8501}:${UI_PORT:-8501}"
    depends_on:
      api:
        condition: service_healthy

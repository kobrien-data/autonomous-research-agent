name: Autonomous Research Agent Actions
run-name:
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Lint with ruff
        run: ruff check .
      - name: Run tests
        run: pytest tests/
      - name: Type check with mypy
        run: mypy .